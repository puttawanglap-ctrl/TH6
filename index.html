<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ผจญภัยหุบเขาอ่านคำจำไปใช้</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Mali', cursive;
            background-color: #87CEEB;
            touch-action: none; /* ป้องกันการเลื่อนหน้าจอเวลาเล่นบนมือถือ */
        }
        
        canvas {
            display: block;
        }

        /* สำหรับ Animation ตอนตอบผิดหน้าต่างจะสั่น */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-2deg); }
            50% { transform: translateX(10px) rotate(2deg); }
            75% { transform: translateX(-10px) rotate(-1deg); }
            100% { transform: translateX(0); }
        }
        
        .shake-animation {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* ซ่อน Scrollbar ของ Pop-up */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-gray-800 select-none">

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Layer: Overlay ทั้งหมดจะอยู่ตรงนี้ -->
    <div id="uiLayer" class="absolute inset-0 pointer-events-none flex flex-col justify-between">
        
        <!-- HUD (Head-Up Display) -->
        <div id="hud" class="hidden p-4 flex-col gap-2 pointer-events-none">
            <div class="flex justify-between items-center w-full max-w-4xl mx-auto">
                <div class="flex items-center gap-3 bg-white/80 p-2 rounded-2xl shadow-md border-2 border-orange-300">
                    <span id="hudAvatar" class="text-3xl">🤠</span>
                    <span id="hudName" class="font-bold text-lg text-orange-600">ผู้เล่น</span>
                </div>
                <div class="flex items-center gap-4 bg-white/80 p-2 px-4 rounded-2xl shadow-md border-2 border-orange-300">
                    <div id="hudHearts" class="text-2xl tracking-widest text-red-500">❤️❤️❤️</div>
                    <div class="text-xl font-bold text-blue-600">คะแนน: <span id="hudScore">0</span>/20</div>
                </div>
            </div>
            <!-- Progress Bar -->
            <div class="w-full max-w-4xl mx-auto h-4 bg-gray-200 rounded-full border-2 border-white shadow-inner overflow-hidden">
                <div id="progressBar" class="h-full bg-gradient-to-r from-yellow-400 to-orange-500 w-0 transition-all duration-300"></div>
            </div>
        </div>

        <!-- Mobile Controls (แสดงเฉพาะจอมือถือ) -->
        <div id="mobileControls" class="hidden p-4 justify-between items-end pb-8 pointer-events-auto">
            <div class="flex gap-4">
                <button id="btnLeft" class="w-16 h-16 bg-white/50 rounded-full shadow-lg border-2 border-gray-300 flex items-center justify-center active:bg-white/80 transition-colors">
                    <svg class="w-8 h-8 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <button id="btnRight" class="w-16 h-16 bg-white/50 rounded-full shadow-lg border-2 border-gray-300 flex items-center justify-center active:bg-white/80 transition-colors">
                    <svg class="w-8 h-8 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
            <button id="btnJump" class="w-20 h-20 bg-orange-400/60 rounded-full shadow-lg border-2 border-orange-300 flex items-center justify-center active:bg-orange-500/80 transition-colors">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
            </button>
        </div>
    </div>

    <!-- Start Screen Modal -->
    <div id="startScreen" class="absolute inset-0 bg-yellow-100/90 flex flex-col items-center justify-center p-4 z-50 pointer-events-auto backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center border-4 border-orange-400">
            <h1 class="text-4xl font-bold text-orange-600 mb-2 leading-snug">ผจญภัยหุบเขา<br>อ่านคำจำไปใช้</h1>
            <p class="text-gray-600 mb-6 font-semibold">วิชาวิทยาการคำนวณ + ภาษาไทย ป.6</p>
            
            <div class="mb-4">
                <label class="block text-left font-bold mb-2 text-blue-600">ชื่อนักผจญภัย:</label>
                <input type="text" id="playerNameInput" placeholder="กรอกชื่อของคุณ..." class="w-full p-3 rounded-xl border-2 border-gray-300 focus:border-orange-500 focus:outline-none text-lg">
            </div>

            <div class="mb-6">
                <label class="block text-left font-bold mb-2 text-blue-600">เลือกหมวก (Avatar):</label>
                <div class="flex justify-between gap-2">
                    <button class="avatar-btn flex-1 text-4xl p-2 rounded-xl border-2 border-orange-500 bg-orange-100" data-avatar="🤠">🤠</button>
                    <button class="avatar-btn flex-1 text-4xl p-2 rounded-xl border-2 border-gray-200 hover:bg-gray-100" data-avatar="👷">👷</button>
                    <button class="avatar-btn flex-1 text-4xl p-2 rounded-xl border-2 border-gray-200 hover:bg-gray-100" data-avatar="👩‍🌾">👩‍🌾</button>
                    <button class="avatar-btn flex-1 text-4xl p-2 rounded-xl border-2 border-gray-200 hover:bg-gray-100" data-avatar="🧙‍♂️">🧙‍♂️</button>
                </div>
            </div>

            <button id="startBtn" class="w-full bg-gradient-to-r from-orange-400 to-red-500 text-white font-bold text-xl py-4 rounded-xl shadow-lg hover:scale-105 transition-transform active:scale-95">
                เริ่มเกมเลย! 🚀
            </button>
            <p class="text-sm text-gray-500 mt-4 font-bold">เคล็ดลับ: สามารถ <span class="text-blue-500">"กระโดด 2 จังหวะ"</span> (Double Jump) ได้นะ!</p>
            <p class="text-xs text-gray-400 mt-1">ควบคุมด้วยปุ่มลูกศร (หรือ A, D, Spacebar)</p>
        </div>
    </div>

    <!-- Quiz Modal -->
    <div id="quizScreen" class="hidden absolute inset-0 bg-black/60 flex flex-col items-center justify-center p-4 z-50 pointer-events-auto">
        <div id="quizBox" class="bg-white p-6 md:p-8 rounded-3xl shadow-2xl max-w-lg w-full text-center border-4 border-blue-400 transform transition-transform scale-95">
            <div class="bg-blue-100 text-blue-800 px-4 py-1 rounded-full inline-block font-bold mb-4 text-sm">เห็ดคำถาม! 🍄</div>
            <p id="quizQuestion" class="text-xl md:text-2xl font-bold text-gray-800 mb-6 leading-relaxed">คำถามจะแสดงที่นี่...</p>
            
            <div id="quizOptions" class="flex flex-col gap-3 mb-4">
                <!-- ตัวเลือกจะถูกสร้างด้วย JS -->
            </div>

            <div id="quizResult" class="hidden mt-4 bg-gray-100 p-4 rounded-xl text-left border-l-4">
                <p id="quizResultTitle" class="font-bold text-lg mb-1"></p>
                <p id="quizExplanation" class="text-gray-700 text-sm md:text-base leading-relaxed"></p>
                <button id="quizContinueBtn" class="mt-4 w-full bg-blue-500 text-white font-bold py-2 rounded-lg hover:bg-blue-600 transition-colors">
                    เดินทางต่อ ➡
                </button>
            </div>
        </div>
    </div>

    <!-- Game Over / Victory Modal -->
    <div id="endScreen" class="hidden absolute inset-0 bg-black/80 flex flex-col items-center justify-center p-4 z-50 pointer-events-auto backdrop-blur-md">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center border-4 border-purple-500">
            <h1 id="endTitle" class="text-5xl font-bold mb-2"></h1>
            <p id="endSubtitle" class="text-xl text-gray-600 mb-6 font-semibold"></p>
            
            <div class="bg-purple-100 p-4 rounded-2xl mb-6">
                <p class="text-gray-700 font-bold mb-1">ผลคะแนนของ <span id="endPlayerName" class="text-orange-600"></span></p>
                <p class="text-4xl font-bold text-purple-700"><span id="endScore">0</span> <span class="text-xl text-purple-500">/ 20</span></p>
            </div>

            <button onclick="location.reload()" class="w-full bg-gradient-to-r from-purple-500 to-indigo-500 text-white font-bold text-xl py-3 rounded-xl shadow-lg hover:scale-105 transition-transform active:scale-95">
                เล่นใหม่อีกครั้ง 🔄
            </button>
        </div>
    </div>

    <script>
        /**
         * ข้อมูลคำถาม 20 ข้อ (บูรณาการ วิทยาการคำนวณ + ภาษาไทย ป.6)
         * ปรับปรุงตัวลวง (Distractors) ให้เนียนขึ้น ไม่ผิดชัดเจนเกินไป
         */
        const questionsData = [
            {
                q: "ข้อใดเรียงลำดับขั้นตอน (Algorithm) การเขียนจดหมายได้ถูกต้องตามหลักภาษา?",
                options: ["เขียนเนื้อความ -> จ่าหน้าซอง -> ลงชื่อ", "เขียนคำขึ้นต้น -> เขียนเนื้อความ -> ลงชื่อ", "จ่าหน้าซอง -> เขียนคำขึ้นต้น -> ลงชื่อ"],
                correct: 1,
                explanation: "ลำดับที่ถูกต้องภายในจดหมายคือ 'เขียนคำขึ้นต้น' ตามด้วย 'เนื้อความ' และ 'ลงชื่อ' ตอนท้าย (ส่วนการจ่าหน้าซองคือขั้นตอนที่ทำบนซองหลังเขียนเสร็จ)"
            },
            {
                q: "ใช้หลักตรรกะพิจารณา: คำในข้อใดสะกดด้วย 'มาตรากน' ทุกคำ?",
                options: ["บริเวณ, สัญญาณ, ปริมาณ", "อาหาร, โอกาส, พยาบาล", "วิญญาณ, เคารพ, รัฐบาล"],
                correct: 0,
                explanation: "ณ เป็นตัวสะกดในมาตราแม่กน (บริเวณ, สัญญาณ, ปริมาณ) ส่วนข้ออื่นมีตัวลวง เช่น โอกาส (แม่กด) และ เคารพ (แม่กบ)"
            },
            {
                q: "อนุกรมคำ: กา -> กิน -> กุ้ง -> ... คำต่อไปควรใช้สระอะไร หากเรียงตามลำดับรูปสระที่เปลี่ยนไป?",
                options: ["กาง (สระอา)", "เกม (สระเอ)", "กอด (สระออ)"],
                correct: 1,
                explanation: "สังเกตแบบรูปสระ: อา -> อิ -> อุ ... ถัดไปควรเป็นสระ เอ (เช่น เกม) ตามลำดับการเรียนรู้สระพื้นฐาน"
            },
            {
                q: "ถ้า A = 'รถ', B = 'ไฟ', C = 'ฟ้า' ประโยค 'รถไฟฟ้า' เขียนเป็นโค้ดได้ว่า A+B+C หากต้องการประโยค 'ฟ้าไฟรถ' จะเขียนโค้ดอย่างไร?",
                options: ["B+C+A", "A+C+B", "C+B+A"],
                correct: 2,
                explanation: "การนำตัวแปรมาต่อกัน (String Concatenation): C(ฟ้า) + B(ไฟ) + A(รถ) = ฟ้าไฟรถ"
            },
            {
                q: "ข้อใดเป็นการจัดกลุ่ม (Classification) คำที่มี 'ตัวการันต์' เป็นพยัญชนะ 2 ตัว ทุกคำ?",
                options: ["วันจันทร์, พระอินทร์, สายสิญจน์", "แพทย์, สัตว์, ประดิษฐ์", "ภาพยนตร์, กาญจน์, วันเสาร์"],
                correct: 0,
                explanation: "วันจันทร์ (ทร์), พระอินทร์ (ทร์), สายสิญจน์ (จน์) มีตัวการันต์ 2 ตัวทั้งหมด ส่วนข้ออื่นมีตัวการันต์ 1 ตัวปนอยู่"
            },
            {
                q: "การค้นหาข้อมูล (Search): หากต้องการหาความหมายของคำว่า 'เว็บไซต์' ในพจนานุกรม ต้องเปิดหาที่หมวดตัวอักษรใด?",
                options: ["ว.แหวน", "ซ.โซ่", "ส.เสือ"],
                correct: 0,
                explanation: "พจนานุกรมไทยเรียงตามพยัญชนะต้นตัวแรก 'เว็บไซต์' เริ่มต้นด้วย 'ว.แหวน'"
            },
            {
                q: "ตรรกะเงื่อนไข: ถ้าคำนั้นเป็น 'คำควบกล้ำแท้' ให้ 1 คะแนน. คำชุดใดจะได้ 2 คะแนนพอดี?",
                options: ["กล้วย, จริง, สร้าง", "ครอบครัว, เปลี่ยนแปลง, ทราบ", "พลุ, ขวาน, ตลาด"],
                correct: 1, // ครอบครัว(แท้), เปลี่ยนแปลง(แท้), ทราบ(ไม่แท้) = 2 คะแนน
                explanation: "ครอบครัว (แท้), เปลี่ยนแปลง (แท้) ได้ 2 คะแนน ส่วน ทราบ เป็นคำควบกล้ำไม่แท้ (ทร ออกเสียง ซ)"
            },
            {
                q: "ประมวลผลข้อมูล: ประโยค 'ฉันชอบเรียนวิทยาการคำนวณ' มีพยางค์ทั้งหมดกี่พยางค์?",
                options: ["8 พยางค์", "9 พยางค์", "10 พยางค์"],
                correct: 2,
                explanation: "ฉัน(1)-ชอบ(2)-เรียน(3)-วิด(4)-ทะ(5)-ยา(6)-กาน(7)-คำ(8)-นวน(9) ... เอ๊ะ! ขออภัย เฉลยที่ถูกต้องคือ 9 พยางค์ครับ (ปรับให้เด็กลองนับดูดีๆ)" // ข้อนี้แก้ตัวเลือกให้ถูกต้องด้านล่าง
            }, // แก้ไขข้อ 8 ให้เคลียร์
            {
                q: "การถอดรหัส (Decoding): หากกำหนดให้สระอู (ู) = เครื่องหมายบวก (+) คำว่า 'คุณครู' จะเขียนเข้ารหัสได้ตามข้อใด?",
                options: ["ค+ณครู", "คุณคร+", "ค+ณคร+"],
                correct: 1,
                explanation: "สระอุ ไม่เท่ากับ สระอู. คำว่า 'ครู' มีสระอู จึงเปลี่ยนเป็น 'คร+' ได้เป็น คุณคร+"
            },
            {
                q: "อนุกรมพยัญชนะ: ฎ, ฏ, ฐ, ฑ, ... ตัวต่อไปตามลำดับอักษรไทยคือตัวใด?",
                options: ["ฒ", "ณ", "ด"],
                correct: 0,
                explanation: "ลำดับพยัญชนะไทยที่ถูกต้องคือ ฎ ฏ ฐ ฑ ฒ (ผู้เฒ่า)"
            },
            {
                q: "การตรวจสอบข้อผิดพลาด (Debugging): ประโยคในข้อใดมีคำที่ 'สะกดผิด' ซ่อนอยู่ 1 จุด?",
                options: ["คุณยายทำแกงมัสมั่นไก่", "ฉันชอบกินผัดกระเพรา", "นักเรียนกำลังทำเวรทำความสะอาด"],
                correct: 1,
                explanation: "ข้อที่ผิดคือ 'กระเพรา' ที่ถูกต้องเขียนว่า 'กะเพรา' (ไม่มี ร.เรือ ที่ ก.ไก่)"
            },
            {
                q: "ลูป (Loop): หากทำซ้ำคำว่า 'ก-ข-ค' ไปเรื่อยๆ ตัวอักษรในตำแหน่งที่ 7 คือตัวใด?",
                options: ["ก", "ข", "ค"],
                correct: 0,
                explanation: "รอบที่ 1:ก(1) ข(2) ค(3), รอบที่ 2:ก(4) ข(5) ค(6), รอบที่ 3: ก(7) ดังนั้นตำแหน่งที่ 7 คือ ก.ไก่"
            },
            {
                q: "คำในข้อใดเกิดจากการประสมคำ (การบวก String) ที่ทำให้เกิด 'ความหมายใหม่' ทุกคำ?",
                options: ["น้ำใจ, แม่น้ำ, ไฟฟ้า", "กินข้าว, ดื่มน้ำ, นอนหลับ", "หางเสือ, เก้าอี้, โต๊ะเรียน"],
                correct: 0,
                explanation: "คำประสมคือคำสองคำรวมกันแล้วเกิดความหมายใหม่ เช่น น้ำ+ใจ = น้ำใจ (ความเอื้อเฟื้อ) ไม่ใช่น้ำที่มีใจ"
            },
            {
                q: "อัลกอริทึมการแยกส่วนประกอบคำ: คำว่า 'เหตุ' ประกอบด้วยส่วนใดบ้าง?",
                options: ["พยัญชนะต้น + สระ + ตัวสะกด + วรรณยุกต์", "พยัญชนะต้น + สระ + ตัวสะกด", "พยัญชนะต้น + สระประสม"],
                correct: 1,
                explanation: "ห (พยัญชนะต้น) + เ- (สระ) + ตุ (ตัวสะกด) ไม่มีรูปวรรณยุกต์ (ต.เต่า และ สระอุ ทำหน้าที่เป็นตัวสะกดในแม่กด)"
            },
            {
                q: "การใช้ตรรกะ 'หรือ' (OR): ประโยคใดใช้สันธานที่แสดงความหมาย 'ให้เลือกอย่างใดอย่างหนึ่ง'?",
                options: ["พอฝนตกหนัก เขาก็รีบกลับบ้าน", "เธอจะส่งงานวันนี้ หรือจะส่งพรุ่งนี้", "พ่อและแม่ไปตลาดด้วยกัน"],
                correct: 1,
                explanation: "'หรือ' เป็นคำสันธานเชื่อมประโยคที่ให้เลือกอย่างใดอย่างหนึ่ง (Logical OR)"
            },
            {
                q: "หาค่าตัวแปร: X = คำไวพจน์ของ 'นก', Y = คำไวพจน์ของ 'ดอกไม้'. X และ Y คือคำใด?",
                options: ["สกุณา, ผกา", "มัจฉา, บุปผา", "กุญชร, มาลี"],
                correct: 0,
                explanation: "สกุณา แปลว่า นก, ผกา แปลว่า ดอกไม้ (มัจฉา=ปลา, กุญชร=ช้าง)"
            },
            {
                q: "ข้อใดเป็นการเรียงข้อมูล (Sorting) คำศัพท์ตามลำดับพจนานุกรมได้ถูกต้อง?",

            },

                options: ["ร", "ค", "ค์"],
                correct: 1,
                explanation: "คำว่า 'สรรค์' มี ค.ควาย เป็นตัวการันต์ (มีเครื่องหมายทัณฑฆาตกำกับ ทำให้ ค ไม่ออกเสียง)"
            },
            {
                q: "Output ของโปรแกรมนี้คืออะไร: ป้อนอักษร 'ต', สระ 'อา', ตัวสะกด 'ก', วรรณยุกต์ 'โท'?",
                options: ["ตาก", "ต้าก", "ต๊าก"],

            }
        ];
        
        // แก้ไขคำถามข้อที่ 8 ย้อนหลังให้มีตัวเลือกที่ถูก
        questionsData[7] = {
            q: "ประมวลผลข้อมูล: ประโยค 'ฉันชอบเรียนวิทยาการคำนวณ' มีพยางค์ทั้งหมดกี่พยางค์?",
            options: ["8 พยางค์", "9 พยางค์", "10 พยางค์"],
            correct: 1,
            explanation: "ออกเสียงว่า ฉัน(1)-ชอบ(2)-เรียน(3)-วิด(4)-ทะ(5)-ยา(6)-กาน(7)-คำ(8)-นวน(9) รวม 9 พยางค์"
        };

        // --- Game System Variables ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameState = 'START'; // START, PLAYING, QUIZ, GAMEOVER, VICTORY
        let animationId;
        let audioCtx;
        
        // --- Game World & Physics ---
        // ปรับสมดุลฟิสิกส์ให้เล่นลื่นขึ้นและโดดง่ายขึ้น
        const gravity = 0.45;  // ลดแรงโน้มถ่วงลงนิดนึงให้ลอยตัวง่ายขึ้น
        const friction = 0.85; // ลื่นขึ้นเล็กน้อยเวลาวิ่ง
        const moveSpeed = 6;   // วิ่งเร็วขึ้นนิดนึง
        const jumpForce = -11; // พลังกระโดดพอดีๆ กับ Gravity ใหม่
        
        // --- Player Data ---
        const player = {
            x: 100, y: 100, w: 40, h: 40,
            vx: 0, vy: 0,
            isGrounded: false,
            jumps: 0,       // จำนวนครั้งที่กระโดดไปแล้ว
            maxJumps: 2,    // กระโดดได้ 2 จังหวะ (Double Jump)
            name: "",
            avatar: "🤠",
            score: 0,
            hearts: 3,
            checkpointX: 100,
            checkpointY: 100,
            facingRight: true
        };

        const keys = { left: false, right: false, up: false };
        
        // --- Camera Data ---
        let camera = { x: 0, y: 0 };
        
        // --- Level Data ---
        let platforms = [];
        let mushrooms = [];
        let particles = [];
        let finishLine = { x: 0, w: 100 }; // กำหนดตอนสร้างด่าน
        let levelWidth = 0;
        
        // สถานะคำถาม
        let currentMushroomIndex = -1;

        // --- Audio Engine (Web Audio API) ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(600, now + 0.1);
                osc.frequency.setValueAtTime(800, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'fall') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'win') {
                osc.type = 'sine';
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => { // C E G C
                    osc.frequency.setValueAtTime(freq, now + (i * 0.15));
                });
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now);
                osc.stop(now + 0.8);
            }
        }

        // --- Initialization & Level Design ---
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // แสดง Mobile controls ถ้ายาวกว่าสูง หรือเป็นจอสัมผัส (ง่ายๆ เช็คความกว้าง)
            if (window.innerWidth <= 768 || 'ontouchstart' in window) {
                document.getElementById('mobileControls').classList.remove('hidden');
                document.getElementById('mobileControls').classList.add('flex');
            } else {
                document.getElementById('mobileControls').classList.add('hidden');
                document.getElementById('mobileControls').classList.remove('flex');
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function generateLevel() {
            platforms = [];
            mushrooms = [];
            
            const startY = canvas.height - 150;
            let currentX = 0;
            
            // พื้นฐานเริ่มต้น (ปลอดภัย)
            platforms.push({ x: currentX, y: startY, w: 600, h: 200, color: '#8B4513' }); // ดิน
            platforms.push({ x: currentX, y: startY, w: 600, h: 20, color: '#7CFC00' }); // หญ้า
            currentX += 600;

            // สร้างด่านสำหรับ 20 คำถาม
            for (let i = 0; i < questionsData.length; i++) {
                // ปรับช่องว่างให้กระโดดง่ายขึ้น ไม่ไกลเกินไป (สำหรับ ป.6)
                let gap = 80 + Math.random() * 100; // ช่องว่างแคบลงนิดนึง ปลอดภัยขึ้น
                currentX += gap;

                // ปรับความกว้างแท่นให้กว้างพอลงจอดง่ายๆ
                let platW = 400 + Math.random() * 200; 
                let platY = startY - 50 + (Math.random() * 150 - 75); // สูงต่ำสลับกัน
                
                // อย่าให้แท่นสูงหรือต่ำเกินไป
                if (platY > canvas.height - 50) platY = canvas.height - 100;
                if (platY < 200) platY = 200;

                // ใส่แท่น
                platforms.push({ x: currentX, y: platY, w: platW, h: canvas.height - platY, color: '#8B4513' });
                platforms.push({ x: currentX, y: platY, w: platW, h: 20, color: '#7CFC00' });

                // วางเห็ดคำถามตรงกลางแท่นนี้
                mushrooms.push({
                    x: currentX + (platW / 2) - 20,
                    y: platY - 40,
                    w: 40, h: 40,
                    qData: questionsData[i],
                    collected: false,
                    baseY: platY - 40,
                    hoverPhase: Math.random() * Math.PI * 2
                });

                currentX += platW;
            }

            // แท่นเส้นชัย
            currentX += 200;
            platforms.push({ x: currentX, y: startY, w: 1000, h: 200, color: '#8B4513' });
            platforms.push({ x: currentX, y: startY, w: 1000, h: 20, color: '#7CFC00' });
            
            finishLine = { x: currentX + 400, w: 100, y: startY - 200, h: 200 };
            levelWidth = currentX + 800;
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (gameState !== 'PLAYING') return;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') {
                // ระบบ Double Jump
                if (player.jumps < player.maxJumps) {
                    player.vy = jumpForce;
                    player.jumps++;
                    player.isGrounded = false;
                    playSound('jump');
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        });

        // Mobile Touch Controls
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnJump = document.getElementById('btnJump');

        const addTouch = (btn, keyName) => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameState !== 'PLAYING') return;
                keys[keyName] = true;
                
                // ระบบ Double Jump สำหรับมือถือ
                if (keyName === 'up' && player.jumps < player.maxJumps) {
                    player.vy = jumpForce;
                    player.jumps++;
                    player.isGrounded = false;
                    playSound('jump');
                    keys.up = false; // ป้องกันกระโดดค้าง
                }
            }, {passive: false});
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[keyName] = false;
            }, {passive: false});
        };

        addTouch(btnLeft, 'left');
        addTouch(btnRight, 'right');
        addTouch(btnJump, 'up');


        // --- UI Interactions ---
        // เลือก Avatar
        document.querySelectorAll('.avatar-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.avatar-btn').forEach(b => {
                    b.classList.remove('border-orange-500', 'bg-orange-100');
                    b.classList.add('border-gray-200');
                });
                e.target.classList.add('border-orange-500', 'bg-orange-100');
                e.target.classList.remove('border-gray-200');
                player.avatar = e.target.dataset.avatar;
            });
        });

        // ปุ่มเริ่มเกม
        document.getElementById('startBtn').addEventListener('click', () => {
            const nameInput = document.getElementById('playerNameInput').value.trim();
            if (nameInput === "") {

            }

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');

            document.getElementById('hudAvatar').innerText = player.avatar;
            
            generateLevel();
            player.x = 100;
            player.y = platforms[0].y - player.h - 10;
            player.checkpointX = player.x;
            player.checkpointY = player.y;
            player.hearts = 3;
            player.score = 0;
            updateHUD();
            
            gameState = 'PLAYING';
            requestAnimationFrame(gameLoop);
        });

        function updateHUD() {
            document.getElementById('hudScore').innerText = player.score;
            let heartStr = '';
            for(let i=0; i<player.hearts; i++) heartStr += '❤️';
            for(let i=0; i<3-player.hearts; i++) heartStr += '🖤';
            document.getElementById('hudHearts').innerText = heartStr;

            // Progress bar
            let progress = (player.x / levelWidth) * 100;
            if (progress > 100) progress = 100;
            if (progress < 0) progress = 0;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        // --- Core Game Logic ---
        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.w &&
                   r1.x + r1.w > r2.x &&
                   r1.y < r2.y + r2.h &&
                   r1.y + r1.h > r2.y;
        }

        function spawnParticles(x, y) {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 1) * 10,
                    life: 1,
                    color: `hsl(${Math.random() * 60 + 30}, 100%, 50%)` // ส้มเหลือง
                });
            }
        }

        function triggerQuiz(index) {
            gameState = 'QUIZ';
            keys.left = false; keys.right = false; // หยุดเดิน
            currentMushroomIndex = index;
            const qData = mushrooms[index].qData;
            
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('quizResult').classList.add('hidden');
            document.getElementById('quizBox').classList.remove('shake-animation');
            document.getElementById('quizOptions').style.display = 'flex';
            
            document.getElementById('quizQuestion').innerText = qData.q;
            
            const optionsContainer = document.getElementById('quizOptions');
            optionsContainer.innerHTML = '';
            
            qData.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left bg-white border-2 border-gray-300 p-4 rounded-xl text-lg hover:bg-blue-50 hover:border-blue-400 transition-colors focus:outline-none focus:ring-4 focus:ring-blue-200 active:scale-95";
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(i);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex) {
            const qData = mushrooms[currentMushroomIndex].qData;
            const isCorrect = selectedIndex === qData.correct;
            
            document.getElementById('quizOptions').style.display = 'none';
            const resultBox = document.getElementById('quizResult');
            resultBox.classList.remove('hidden');
            
            if (isCorrect) {
                playSound('correct');
                player.score++;
                updateHUD();
                spawnParticles(player.x - camera.x + 20, player.y - camera.y);
                
                resultBox.className = "mt-4 bg-green-50 p-4 rounded-xl text-left border-l-4 border-green-500";
                document.getElementById('quizResultTitle').innerText = "🎉 ถูกต้องเก่งมาก!";
                document.getElementById('quizResultTitle').className = "font-bold text-lg mb-1 text-green-700";
            } else {
                playSound('wrong');
                // Effect สั่นหน้าจอ
                const quizBox = document.getElementById('quizBox');
                quizBox.classList.remove('shake-animation');
                void quizBox.offsetWidth; // trigger reflow
                quizBox.classList.add('shake-animation');
                
                resultBox.className = "mt-4 bg-red-50 p-4 rounded-xl text-left border-l-4 border-red-500";
                document.getElementById('quizResultTitle').innerText = "😅 ยังไม่ถูกน้า...";
                document.getElementById('quizResultTitle').className = "font-bold text-lg mb-1 text-red-700";
            }
            
            document.getElementById('quizExplanation').innerText = qData.explanation;
            mushrooms[currentMushroomIndex].collected = true; // เก็บแล้ว
            
            // อัปเดต Checkpoint เป็นตำแหน่งแท่นล่าสุดที่ปลอดภัย
            player.checkpointX = player.x;
            player.checkpointY = platforms.find(p => p.x <= player.x && p.x+p.w >= player.x && p.color === '#8B4513').y - player.h - 10;
        }

        document.getElementById('quizContinueBtn').addEventListener('click', () => {
            document.getElementById('quizScreen').classList.add('hidden');
            gameState = 'PLAYING';
        });

        function handleGameOver() {
            gameState = 'GAMEOVER';
            document.getElementById('endScreen').classList.remove('hidden');
            document.getElementById('endTitle').innerText = "Game Over!";
            document.getElementById('endTitle').className = "text-5xl font-bold mb-2 text-red-600";
            document.getElementById('endSubtitle').innerText = "พยายามเข้านะ นักผจญภัย!";
            document.getElementById('endPlayerName').innerText = player.name;
            document.getElementById('endScore').innerText = player.score;
        }

        function handleVictory() {
            gameState = 'VICTORY';
            playSound('win');
            document.getElementById('endScreen').classList.remove('hidden');
            document.getElementById('endTitle').innerText = "Victory! 🎉";
            document.getElementById('endTitle').className = "text-5xl font-bold mb-2 text-green-600";
            document.getElementById('endSubtitle').innerText = "ยินดีด้วย! คุณเรียนรู้และผจญภัยสำเร็จแล้ว";
            document.getElementById('endPlayerName').innerText = player.name;
            document.getElementById('endScore').innerText = player.score;
            spawnParticles(canvas.width/2, canvas.height/2);
        }

        function resetPlayerPosition() {
            player.x = player.checkpointX;
            player.y = player.checkpointY;
            player.vx = 0;
            player.vy = 0;
            camera.x = player.x - canvas.width / 2;
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // การเคลื่อนที่ X
            if (keys.left) {
                player.vx -= 1;
                player.facingRight = false;
            }
            if (keys.right) {
                player.vx += 1;
                player.facingRight = true;
            }
            player.vx *= friction;
            
            // จำกัดความเร็ว
            if (player.vx > moveSpeed) player.vx = moveSpeed;
            if (player.vx < -moveSpeed) player.vx = -moveSpeed;
            
            player.x += player.vx;

            // ชนขอบซ้ายสุดของโลก
            if (player.x < 0) { player.x = 0; player.vx = 0; }

            // ฟิสิกส์แกน Y (แรงโน้มถ่วง)
            player.vy += gravity;
            player.y += player.vy;
            player.isGrounded = false;

            // ตรวจสอบการชนกับแท่น (Platform Collision)
            for (let p of platforms) {
                if (checkCollision(player, p)) {
                    // ชนด้านบนของแท่น (ลงจอด)
                    if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 15) {
                        player.isGrounded = true;
                        player.jumps = 0; // รีเซ็ตจำนวนครั้งที่กระโดดเมื่อแตะพื้น
                        player.vy = 0;
                        player.y = p.y - player.h;
                    } 
                    // ชนด้านล่าง (โหม่งเพดาน)
                    else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 15) {
                        player.vy = 0;
                        player.y = p.y + p.h;
                    }
                    // ชนด้านข้าง
                    else {
                        if (player.vx > 0) { // ชนซ้ายของแท่น
                            player.x = p.x - player.w;
                            player.vx = 0;
                        } else if (player.vx < 0) { // ชนขวาของแท่น
                            player.x = p.x + p.w;
                            player.vx = 0;
                        }
                    }
                }
            }

            // ตกหลุม (ตาย)
            if (player.y > canvas.height + 100) {
                playSound('fall');
                player.hearts--;
                updateHUD();
                if (player.hearts <= 0) {
                    handleGameOver();
                } else {
                    resetPlayerPosition();
                }
            }

            // ชนเห็ด
            for (let i = 0; i < mushrooms.length; i++) {
                let m = mushrooms[i];
                if (!m.collected) {
                    // Animation เห็ดลอยขึ้นลง
                    m.y = m.baseY + Math.sin(Date.now() / 200 + m.hoverPhase) * 5;
                    
                    if (checkCollision(player, m)) {
                        triggerQuiz(i);
                        break; // ป้องกันชนหลายอันพร้อมกัน
                    }
                }
            }

            // ชนเส้นชัย
            if (checkCollision(player, finishLine)) {
                handleVictory();
            }

            // อัปเดต Camera (ตามผู้เล่น แต่ไม่ให้ล้นขอบซ้าย)
            let targetCamX = player.x - canvas.width / 3;
            if (targetCamX < 0) targetCamX = 0;
            camera.x += (targetCamX - camera.x) * 0.1; // Smooth camera
            
            // อัปเดต Progress
            if(Math.random() < 0.1) updateHUD(); // ไม่ต้องอัปเดตทุกเฟรมเพื่อประหยัด CPU

            // อัปเดต Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2; // Gravity สำหรับ particles
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            // ล้างหน้าจอ (ท้องฟ้า)
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // วาดพระอาทิตย์ (ติดกล้อง)
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(canvas.width - 100, 100, 50, 0, Math.PI * 2);
            ctx.fill();

            // Parallax Background (ภูเขา)
            ctx.fillStyle = '#78AB78';
            for (let i = 0; i < 20; i++) {
                let mX = (i * 400) - (camera.x * 0.2); // เลื่อนช้ากว่ากล้อง
                ctx.beginPath();
                ctx.moveTo(mX, canvas.height);
                ctx.lineTo(mX + 200, canvas.height - 300);
                ctx.lineTo(mX + 400, canvas.height);
                ctx.fill();
            }
            ctx.fillStyle = '#90C090';
            for (let i = 0; i < 20; i++) {
                let mX = (i * 300) - 150 - (camera.x * 0.4); 
                ctx.beginPath();
                ctx.moveTo(mX, canvas.height);
                ctx.lineTo(mX + 150, canvas.height - 200);
                ctx.lineTo(mX + 300, canvas.height);
                ctx.fill();
            }

            // -- เริ่มระบบพิกัดอิงตามกล้อง --
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // วาด Platform
            for (let p of platforms) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.w, p.h);
            }

            // วาดเส้นชัย
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fillRect(finishLine.x, finishLine.y, finishLine.w, finishLine.h);
            // ลายตารางหมากรุกเส้นชัย
            ctx.fillStyle = '#000';
            for(let i=0; i<4; i++){
                for(let j=0; j<8; j++){
                    if((i+j)%2 === 0) {
                        ctx.fillRect(finishLine.x + (i*25), finishLine.y + (j*25), 25, 25);
                    }
                }
            }
            ctx.fillStyle = '#FFF';
            ctx.font = '24px Mali';
            ctx.fillText("เส้นชัย!", finishLine.x + 10, finishLine.y - 20);

            // วาดเห็ดคำถาม
            for (let m of mushrooms) {
                if (!m.collected) {
                    ctx.font = '30px Arial';
                    ctx.fillText('🍄', m.x, m.y + 30);
                    // เครื่องหมาย ? ลอยๆ
                    ctx.fillStyle = '#FFF';
                    ctx.font = 'bold 20px Mali';
                    ctx.fillText('?', m.x + 12, m.y - 5 + Math.sin(Date.now()/150)*5);
                }
            }

            // วาดผู้เล่น
            // ตัว (กล่องสีน้ำเงิน)
            ctx.fillStyle = '#3B82F6';
            ctx.fillRect(player.x, player.y + 10, player.w, player.h - 10);
            
            // ขา (ขยับเวลาเดิน)
            ctx.fillStyle = '#1D4ED8';
            let walkOffset = (player.vx !== 0 && player.isGrounded) ? Math.sin(Date.now() / 50) * 10 : 0;
            ctx.fillRect(player.x + 5 + walkOffset, player.y + player.h, 10, 5); // ขาซ้าย
            ctx.fillRect(player.x + 25 - walkOffset, player.y + player.h, 10, 5); // ขาขวา

            // หน้าตา
            ctx.fillStyle = '#FFF'; // ตาขาว
            ctx.fillRect(player.facingRight ? player.x + 20 : player.x + 5, player.y + 15, 10, 10);
            ctx.fillStyle = '#000'; // ตาดำ
            ctx.fillRect(player.facingRight ? player.x + 25 : player.x + 5, player.y + 17, 5, 5);

            // หมวก Emoji (Avatar)
            ctx.font = '36px Arial';
            ctx.fillText(player.avatar, player.x + 2, player.y + 15);

            // วาดชื่อบนหัว
            ctx.fillStyle = '#000';
            ctx.font = '14px Mali';
            ctx.textAlign = 'center';
            ctx.fillText(player.name, player.x + player.w/2, player.y - 20);
            ctx.textAlign = 'left';

            // วาด Particles (พลุตอนตอบถูก)
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            ctx.restore();
            // -- จบระบบพิกัดกล้อง --
        }

        // --- Main Game Loop ---
        function gameLoop() {
            update();
            draw();
            
            // วนลูปถ้าเกมยังไม่จบแบบสนิท
            if(gameState !== 'GAMEOVER') {
                requestAnimationFrame(gameLoop);
            }
        }

        // เริ่มต้นการวาดหน้าปกไว้ก่อนเผื่อช้า
        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

    </script>
</body>
